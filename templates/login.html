{% extends "base.html" %}
{% block content %}
<div class="min-h-screen bg-gradient-to-br from-indigo-700 via-blue-700 to-indigo-800 flex items-center justify-center p-6">
    <div class="bg-white rounded-3xl shadow-2xl w-full max-w-md p-10">
        
        <!-- Logo / Titel -->
        <div class="text-center mb-10">
            <h1 class="text-5xl font-bold text-gray-900 tracking-tight">LehrerEcho</h1>
            <p class="text-gray-500 mt-3 text-lg">Feedback von Schülern für bessere Lehre</p>
        </div>

        <form method="POST" class="space-y-6">
            
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Benutzername</label>
                <input type="text" name="username" required
                       class="w-full px-6 py-5 border border-gray-300 rounded-2xl focus:outline-none focus:border-indigo-500 text-lg"
                       placeholder="z.B. Max.Mustermann">
            </div>
            
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Passwort</label>
                <input type="password" name="password" required
                       class="w-full px-6 py-5 border border-gray-300 rounded-2xl focus:outline-none focus:border-indigo-500 text-lg"
                       placeholder="Dein Passwort">
            </div>

            <button type="submit"
                    class="w-full bg-indigo-600 hover:bg-indigo-700 text-white py-5 rounded-3xl text-xl font-semibold transition mt-4">
                Anmelden
            </button>
        </form>

        <div class="text-center mt-8">
            <p class="text-gray-600">
                Noch kein Account? 
                <a href="/register" class="text-indigo-600 font-semibold hover:underline">Jetzt registrieren</a>
            </p>
        </div>

    </div>
</div>
{% endblock %}
