{% extends "base.html" %}
{% block content %}
<div class="min-h-screen bg-gradient-to-br from-indigo-700 via-blue-700 to-indigo-800 flex items-center justify-center p-6">
    <div class="bg-white rounded-3xl shadow-2xl w-full max-w-md p-10">
        
        <div class="text-center mb-10">
            <h1 class="text-4xl font-bold text-gray-900">LehrerEcho</h1>
            <p class="text-indigo-600 font-semibold mt-2">Schulleitung Registrierung</p>
            <p class="text-gray-500 mt-3 text-sm">Nur mit gültigem Schulschlüssel möglich</p>
        </div>

        <form method="POST" class="space-y-6">
            
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">18-stelliger Schulschlüssel</label>
                <input type="text" name="key" required
                       class="w-full px-5 py-4 border border-gray-300 rounded-2xl focus:outline-none focus:border-indigo-500 text-lg font-mono"
                       placeholder="z.B. AbC7kP9mX2vQ8wR4tY6">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Voller Name</label>
                <input type="text" name="full_name" required
                       class="w-full px-5 py-4 border border-gray-300 rounded-2xl focus:outline-none focus:border-indigo-500 text-lg"
                       placeholder="z.B. Dr. Anna Schmidt">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Passwort</label>
                <input type="password" name="password" required
                       class="w-full px-5 py-4 border border-gray-300 rounded-2xl focus:outline-none focus:border-indigo-500 text-lg">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Passwort bestätigen</label>
                <input type="password" name="password2" required
                       class="w-full px-5 py-4 border border-gray-300 rounded-2xl focus:outline-none focus:border-indigo-500 text-lg">
            </div>

            <button type="submit"
                    class="w-full bg-indigo-600 hover:bg-indigo-700 text-white py-5 rounded-3xl text-xl font-semibold transition mt-4">
                Als Direktor registrieren
            </button>
        </form>

        <div class="text-center mt-8">
            <a href="/login" class="text-indigo-600 hover:text-indigo-700 font-medium hover:underline">
                ← Zurück zum Login
            </a>
        </div>

    </div>
</div>
{% endblock %}
