{% extends "base.html" %}
{% block content %}
<div class="min-h-screen bg-gradient-to-br from-indigo-700 via-blue-700 to-indigo-800 flex items-center justify-center p-6">
    <div class="bg-white rounded-3xl shadow-2xl w-full max-w-lg p-10">
        
        <!-- Header -->
        <div class="text-center mb-10">
            <h1 class="text-4xl font-bold text-gray-900">LehrerEcho</h1>
            <p class="text-indigo-600 font-semibold mt-2">Neuen Account erstellen</p>
        </div>

        <form method="POST" class="space-y-6">
            
            <!-- Rolle -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Ich bin...</label>
                <select name="role" required onchange="toggleKeyLabel()" 
                        class="w-full px-6 py-5 border border-gray-300 rounded-2xl focus:outline-none focus:border-indigo-500 text-lg">
                    <option value="director">Direktor / Schulleitung</option>
                    <option value="teacher">Lehrer</option>
                    <option value="student" selected>Schüler</option>
                </select>
            </div>

            <!-- Schlüssel -->
            <div>
                <label id="keyLabel" class="block text-sm font-medium text-gray-700 mb-2">
                    18-stelliger Schulschlüssel
                </label>
                <input type="text" name="key" required
                       class="w-full px-6 py-5 border border-gray-300 rounded-2xl focus:outline-none focus:border-indigo-500 text-lg font-mono"
                       placeholder="z.B. AbC7kP9mX2vQ8wR4tY6">
            </div>

            <!-- Name -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Voller Name</label>
                <input type="text" name="full_name" required
                       class="w-full px-6 py-5 border border-gray-300 rounded-2xl focus:outline-none focus:border-indigo-500 text-lg"
                       placeholder="z.B. Max Mustermann oder Dr. Anna Schmidt">
            </div>

            <!-- Passwörter -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Passwort</label>
                <input type="password" name="password" required
                       class="w-full px-6 py-5 border border-gray-300 rounded-2xl focus:outline-none focus:border-indigo-500 text-lg">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Passwort bestätigen</label>
                <input type="password" name="password2" required
                       class="w-full px-6 py-5 border border-gray-300 rounded-2xl focus:outline-none focus:border-indigo-500 text-lg">
            </div>

            <button type="submit"
                    class="w-full bg-indigo-600 hover:bg-indigo-700 text-white py-5 rounded-3xl text-xl font-semibold transition mt-4">
                Account erstellen
            </button>
        </form>

        <div class="text-center mt-8">
            <a href="/login" class="text-indigo-600 font-semibold hover:underline">
                ← Bereits registriert? Zum Login
            </a>
        </div>
    </div>
</div>

<script>
function toggleKeyLabel() {
    const role = document.querySelector('select[name="role"]').value;
    const label = document.getElementById('keyLabel');
    
    if (role === 'director') {
        label.textContent = "18-stelliger Schulschlüssel";
    } else {
        label.textContent = "12-stelliger Personenschlüssel";
    }
}
</script>
{% endblock %}
